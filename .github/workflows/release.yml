name: Check & Release

# Triggers:
#   - daily cron: polls KhiproTeam/khipro-library for a new release
#   - push to main: fires immediately when the portable patch
#     (src/resources.h) or the vendored library (resources/khipro/)
#     changes — so manual bumps don't wait for the next daily run
#   - workflow_dispatch: manual
on:
  schedule:
    - cron: '17 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/resources.h'
      - 'resources/khipro/**'

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.result.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++-mingw-w64-x86-64 gcc-mingw-w64-x86-64 \
            curl unzip

      # ─── Read repo state ──────────────────────────────────────────

      - name: Read portable patch (src/resources.h)
        id: portable_patch
        run: |
          patch=$(grep -oP '(?<=#define KHIPRO_PORTABLE_PATCH ")[^"]+' src/resources.h)
          if [ -z "$patch" ]; then
            echo "ERROR: KHIPRO_PORTABLE_PATCH not found in src/resources.h" >&2
            exit 1
          fi
          echo "patch=$patch" >> "$GITHUB_OUTPUT"

      - name: Read vendored library tag (resources/khipro/.tag)
        id: vendored
        run: |
          if [ -f resources/khipro/.tag ]; then
            tag=$(tr -d '[:space:]' < resources/khipro/.tag)
          else
            tag="none"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Read last released portable tag (.release-tag)
        id: last
        run: |
          if [ -f .release-tag ]; then
            tag=$(tr -d '[:space:]' < .release-tag)
          else
            tag="none"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # ─── Poll upstream ────────────────────────────────────────────

      - name: Get latest tag from KhiproTeam/khipro-library
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=$(gh api repos/KhiproTeam/khipro-library/releases/latest --jq '.tag_name')
          if [ -z "$latest" ]; then
            echo "ERROR: could not resolve latest library tag" >&2
            exit 1
          fi
          echo "tag=$latest" >> "$GITHUB_OUTPUT"

      # ─── Decide ───────────────────────────────────────────────────
      #
      # Single source of truth: does the target portable tag differ
      # from the last released portable tag? If not, exit early and
      # skip update + build + release entirely.
      #
      # target_tag uses the *latest* library tag if the vendored one
      # is behind; otherwise the vendored one. This way:
      #   - library bump on upstream    → target differs → release
      #   - portable-patch bump in repo → target differs → release
      #   - nothing changed             → target matches  → skip all

      - name: Decide
        id: decide
        run: |
          vendored="${{ steps.vendored.outputs.tag }}"
          latest="${{ steps.latest.outputs.tag }}"
          last="${{ steps.last.outputs.tag }}"
          patch="${{ steps.portable_patch.outputs.patch }}"

          if [ "$vendored" = "$latest" ]; then
            lib_tag_for_release="$vendored"
            lib_moved="false"
          else
            lib_tag_for_release="$latest"
            lib_moved="true"
          fi

          lib_ver="${lib_tag_for_release#v}"
          target="v${lib_ver}-${patch}"

          echo "lib_moved=$lib_moved"     >> "$GITHUB_OUTPUT"
          echo "lib_tag=$lib_tag_for_release" >> "$GITHUB_OUTPUT"
          echo "target=$target"           >> "$GITHUB_OUTPUT"

          if [ "$target" = "$last" ]; then
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            echo "No release needed: target ($target) matches last release ($last)."
          else
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
            echo "Release needed: $last -> $target (lib_moved=$lib_moved)"
          fi

      # ─── Short-circuit: nothing to do ─────────────────────────────

      - name: Nothing to do
        if: steps.decide.outputs.release_needed != 'true'
        run: echo "Skipping update + build + release. Already at ${{ steps.decide.outputs.target }}."

      # ─── Refresh vendored library (only if upstream moved) ─────────

      - name: Update vendored library
        if: steps.decide.outputs.release_needed == 'true' && steps.decide.outputs.lib_moved == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/update-khipro-lib.sh

      # ─── Build (only when releasing) ──────────────────────────────

      - name: Build Windows executable
        id: build_exe
        if: steps.decide.outputs.release_needed == 'true'
        run: make

      - name: Verify executable
        if: steps.decide.outputs.release_needed == 'true'
        run: |
          if [ ! -s khipro.exe ]; then
            echo "ERROR: khipro.exe was not produced" >&2
            exit 1
          fi
          file khipro.exe

      # ─── Commit state + publish release ───────────────────────────
      #
      # Committing resources/khipro/ is harmless when lib_moved=false
      # (git add is a no-op for unchanged paths); the conditional just
      # produces a cleaner commit subject.

      - name: Commit library bump + stamp .release-tag
        if: steps.decide.outputs.release_needed == 'true' && steps.build_exe.outcome == 'success'
        run: |
          target="${{ steps.decide.outputs.target }}"
          echo "$target" > .release-tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.decide.outputs.lib_moved }}" = "true" ]; then
            git add resources/khipro .release-tag
            git commit -m "Release $target (library ${{ steps.decide.outputs.lib_tag }})"
          else
            git add .release-tag
            git commit -m "Release $target (portable-only bump)"
          fi
          git push

      - name: Create release
        if: steps.decide.outputs.release_needed == 'true' && steps.build_exe.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          target="${{ steps.decide.outputs.target }}"
          lib_tag="${{ steps.decide.outputs.lib_tag }}"
          gh release create "$target" khipro.exe \
            --title "Khipro Windows Portable - $target" \
            --notes "Built against [khipro library $lib_tag](https://github.com/KhiproTeam/khipro-library/releases/tag/${lib_tag})."

      # ─── Result ───────────────────────────────────────────────────

      - name: Set result
        id: result
        if: always()
        run: |
          if [ "${{ steps.build_exe.outcome }}" = "failure" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.decide.outputs.release_needed }}" != "true" ]; then
            echo "status=up-to-date" >> "$GITHUB_OUTPUT"
          else
            echo "status=released" >> "$GITHUB_OUTPUT"
          fi
